# Этот файл КЛАДЁТСЯ В КАЖДЫЙ РЕПО СЕРВИСА:
#   medkvadrat-patient-api/.github/workflows/docker.yml
#   medkvadrat-max-bot/.github/workflows/docker.yml
#
# Не нужен в medkvadrat-deploy.
#
# Что делает:
#   1. На push в main собирает Docker-образ и пушит в ghcr.io с двумя тегами:
#      ghcr.io/<owner>/<repo>:latest   — всегда последний
#      ghcr.io/<owner>/<repo>:<sha>    — для точечного отката
#   2. Триггерит деплой в репо medkvadrat-deploy через repository_dispatch
#
# ТРЕБОВАНИЯ:
#   - Settings → Actions → General → Workflow permissions → "Read and write"
#   - Secret DEPLOY_DISPATCH_TOKEN (PAT с правами: actions:write, contents:read
#     на medkvadrat-deploy). Обычный GITHUB_TOKEN не может триггерить workflow
#     в другом репозитории — это встроенное ограничение GitHub.

name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/medkvadrat-deploy
          event-type: service-updated
          client-payload: |
            {
              "service": "${{ github.event.repository.name }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }
